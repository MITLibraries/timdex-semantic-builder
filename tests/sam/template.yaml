AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Resources:
  Tokenizer:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Timeout: 900
      MemorySize: 1024
      Architectures:
        - arm64
      ImageUri: tokenizer:latest
      Environment:
        # While tests/sam/env.json is required for sensitive env vars, ALL env vars
        # used in the lambda must exist here as well, even just as "..." placeholders.
        Variables:
          LOG_LEVEL: "INFO"
          WORKSPACE: "dev"
          WARNING_ONLY_LOGGERS: "asyncio"
          SENTRY_DSN: "None"
    Metadata:
      DockerContext: ../../. # Build Lambda Dockerfile
      DockerTag: latest
      Dockerfile: Dockerfile
      SamResourceId: Tokenizer
